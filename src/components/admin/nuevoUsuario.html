<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario - Huerto Hogar</title>
    <link rel="icon" type="image/png" href="../../assets/images/HuertoHogar-Logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>
    <div class="admin-layout-wrapper">
        
        <aside class="admin-sidebar" id="sidebar-menu">
            <div class="sidebar-brand">
                <img src="../../assets/images/HuertoHogar-Logo.jpg" alt="Logo Admin" class="admin-logo-img">
                <span class="admin-brand-name">HuertoHogar</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="homeAdmin.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a></li>
                    <li><a href="productosAdmin.html" class="nav-item"><span class="nav-icon">📦</span> Productos</a></li>
                    <li><a href="usuariosAdmin.html" class="nav-item active"><span class="nav-icon">👥</span> Usuarios</a></li>
                </ul>
            </nav>
        </aside>
        <div class="admin-main-content">
            <main class="admin-dashboard-view">
                
                <div class="auth-container id-register-view" style="max-width: 750px; margin: 0;">
                    <div class="auth-box-form">
                        <div class="auth-title-bar">Crear Nuevo Usuario</div>
                        
                        <form id="form-admin-add-user" class="auth-form-body sub-grid-layout" novalidate>
                            
                            <div class="auth-group-block">
                                <label for="user-run" class="auth-field-label">RUN (SIN PUNTOS NI GUION)</label>
                                <input type="text" id="user-run" class="auth-field-input" placeholder="Ej: 19011022K" minlength="7" maxlength="9" required>
                                <span class="error-msg-field" id="error-user-run"></span>
                            </div>
                            <div class="auth-group-block">
                                <label for="user-role" class="auth-field-label">TIPO DE USUARIO (ROL)</label>
                                <select id="user-role" class="auth-field-select" required>
                                    <option value="">-- Seleccione Perfil --</option>
                                    <option value="Administrador">Administrador</option>
                                    <option value="Vendedor">Vendedor</option>
                                    <option value="Cliente">Cliente</option>
                                </select>
                                <span class="error-msg-field" id="error-user-role"></span>
                            </div>
                            <div class="auth-group-block">
                                <label for="user-name" class="auth-field-label">NOMBRE</label>
                                <input type="text" id="user-name" class="auth-field-input" maxlength="50" required>
                                <span class="error-msg-field" id="error-user-name"></span>
                            </div>
                            <div class="auth-group-block">
                                <label for="user-lastname" class="auth-field-label">APELLIDOS</label>
                                <input type="text" id="user-lastname" class="auth-field-input" maxlength="100" required>
                                <span class="error-msg-field" id="error-user-lastname"></span>
                            </div>
                            <div class="auth-group-block grid-full-width">
                                <label for="user-email" class="auth-field-label">CORREO ELECTRÓNICO</label>
                                <input type="email" id="user-email" class="auth-field-input" maxlength="100" required>
                                <span class="error-msg-field" id="error-user-email"></span>
                            </div>
                            <div class="auth-group-block">
                                <label for="user-region" class="auth-field-label">REGIÓN</label>
                                <select id="user-region" class="auth-field-select" required>
                                    <option value="">-- Seleccione Región --</option>
                                </select>
                                <span class="error-msg-field" id="error-user-region"></span>
                            </div>
                            <div class="auth-group-block">
                                <label for="user-comuna" class="auth-field-label">COMUNA</label>
                                <select id="user-comuna" class="auth-field-select" required>
                                    <option value="">-- Primero elija una región --</option>
                                </select>
                                <span class="error-msg-field" id="error-user-comuna"></span>
                            </div>

                            <div class="auth-action-row grid-full-width" style="justify-content: flex-start; gap: 15px;">
                                <button type="submit" class="btn-submit-auth" style="background-color: var(--color-primary); color:white; border-color:var(--color-primary);">CREAR</button>
                                <a href="usuariosAdmin.html" class="btn-submit-auth" style="text-decoration:none; text-align:center; background-color:#e2e3e5; color:#333; border-color:#d8d8d8;">VOLVER</a>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../../js/main.js"></script>
</body>
</html>
