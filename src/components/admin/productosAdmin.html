<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenedor de Productos - Huerto Hogar</title>

    <link rel="icon" type="image/png" href="../../assets/images/HuertoHogar-Logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>

    <div class="admin-layout-wrapper">
        
        <aside class="admin-sidebar" id="sidebar-menu">
            <div class="sidebar-brand">
                <img src="../../assets/images/HuertoHogar-Logo.jpg" alt="Logo Admin" class="admin-logo-img">
                <span class="admin-brand-name">HuertoHogar</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="homeAdmin.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a></li>
                    <li><a href="productosAdmin.html" class="nav-item active"><span class="nav-icon">📦</span> Productos</a></li>
                    <li><a href="usuariosAdmin.html" class="nav-item"><span class="nav-icon">👥</span> Usuarios</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../../../index.html" class="btn-logout-admin"><span class="nav-icon">🚪</span> Salir de Tienda</a>
            </div>
        </aside>

        <div class="admin-main-content">
            
            <header class="admin-topbar">
                <div class="topbar-user-info">
                    <span class="user-role-badge">Módulo: Catálogo Dinámico</span>
                </div>
            </header>

            <main class="admin-dashboard-view">
                
                <div class="mantenedor-header-row">
                    <h1 class="mantenedor-title">Gestión de Productos</h1>
                    <a href="nuevoProducto.html" class="btn-action-black">NUEVO PRODUCTO</a>
                </div>

                <div class="table-container-responsive">
                    <table class="admin-data-table">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Categoría</th>
                                <th>Nombre Producto</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="admin-products-table-body">
                            </tbody>
                    </table>
                </div>

            </main>
        </div>
    </div>

    <script src="../../js/main.js"></script>
</body>
</html>
