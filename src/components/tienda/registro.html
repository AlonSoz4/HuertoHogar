<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Huerto Hogar</title>

    <link rel="icon" type="image/png" href="../../assets/images/HuertoHogar-Logo.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>

    <!-- HEADER COMPARTIDO -->
    <header class="main-header" id="site-header">
        <div class="header-container">  
            <div class="logo-area">
                <img src="../../assets/images/HuertoHogar-Logo.jpg" alt="Logo HuertoHogar" class="site-logo" id="main-logo">
                <span class="site-title" id="main-title">Huerto Hogar</span>
            </div>
            <nav class="main-nav" id="navigation-bar">
                <ul id="nav-list">
                    <li><a href="../../../index.html" class="nav-link" id="nav-home">Home</a></li>
                    <li><a href="productos.html" class="nav-link" id="nav-products">Productos</a></li>
                    <li><a href="nosotros.html" class="nav-link" id="nav-about">Nosotros</a></li>
                    <li><a href="blog.html" class="nav-link" id="nav-blogs">Blogs</a></li>
                    <li><a href="contacto.html" class="nav-link" id="nav-contact">Contacto</a></li>
                </ul>
            </nav>
            <div class="cart-area" id="cart-status-area">
                <a href="carrito.html" id="cart-btn" class="cart-link">
                    <span class="cart-icon" id="cart-ico">🛒</span> 
                    <span class="cart-text" id="cart-text-label">Cart (<span id="cart-count">0</span>)</span>
                </a>
            </div>
        </div>
    </header>

    <!-- BARRA DE SESIÓN SUPERIOR -->
    <div class="session-bar" id="user-session-bar">
        <div class="session-container">
            <a href="login.html" class="session-link" id="link-login">Iniciar sesión</a>
            <span class="session-divider" id="session-sep">|</span>
            <a href="registro.html" class="session-link active" id="link-register">Registrar usuario</a>
        </div>
    </div>

    <!-- CONTENIDO CENTRAL: REGISTRO -->
    <main class="auth-main-wrapper">
        <div class="auth-container id-register-view">
            
            <div class="auth-box-form">
                <div class="auth-title-bar">Registro de usuario</div>
                
                <form id="form-user-register" class="auth-form-body sub-grid-layout" novalidate>
                    
                    <!-- RUN Obligatorio -->
                    <div class="auth-group-block">
                        <label for="reg-run" class="auth-field-label">RUN (SIN PUNTOS NI GUION)</label>
                        <input type="text" id="reg-run" name="run" class="auth-field-input" minlength="7" maxlength="9" placeholder="Ej: 19011022K" required>
                        <span class="error-msg-field" id="error-reg-run"></span>
                    </div>

                    <!-- Nombre Obligatorio -->
                    <div class="auth-group-block">
                        <label for="reg-name" class="auth-field-label">NOMBRE</label>
                        <input type="text" id="reg-name" name="name" class="auth-field-input" maxlength="50" required>
                        <span class="error-msg-field" id="error-reg-name"></span>
                    </div>

                    <!-- Apellidos Obligatorio -->
                    <div class="auth-group-block">
                        <label for="reg-lastname" class="auth-field-label">APELLIDOS</label>
                        <input type="text" id="reg-lastname" name="lastname" class="auth-field-input" maxlength="100" required>
                        <span class="error-msg-field" id="error-reg-lastname"></span>
                    </div>

                    <!-- Correo Obligatorio -->
                    <div class="auth-group-block">
                        <label for="reg-email" class="auth-field-label">CORREO ELECTRÓNICO</label>
                        <input type="email" id="reg-email" name="email" class="auth-field-input" maxlength="100" required>
                        <span class="error-msg-field" id="error-reg-email"></span>
                    </div>

                    <!-- Contraseña -->
                    <div class="auth-group-block">
                        <label for="reg-password" class="auth-field-label">CONTRASEÑA</label>
                        <input type="password" id="reg-password" name="password" class="auth-field-input" minlength="4" maxlength="12" required>
                        <span class="error-msg-field" id="error-reg-password"></span>
                    </div>

                    <!-- Confirmar Contraseña -->
                    <div class="auth-group-block">
                        <label for="reg-confirm" class="auth-field-label">CONFIRMAR CONTRASEÑA</label>
                        <input type="password" id="reg-confirm" name="confirm_password" class="auth-field-input" required>
                        <span class="error-msg-field" id="error-reg-confirm"></span>
                    </div>

                    <!-- Teléfono Opcional -->
                    <div class="auth-group-block">
                        <label for="reg-phone" class="auth-field-label">TELÉFONO (OPCIONAL)</label>
                        <input type="tel" id="reg-phone" name="phone" class="auth-field-input">
                        <span class="error-msg-field" id="error-reg-phone"></span>
                    </div>

                    <!-- Fecha de Nacimiento Opcional -->
                    <div class="auth-group-block">
                        <label for="reg-birth" class="auth-field-label">FECHA NACIMIENTO (OPCIONAL)</label>
                        <input type="date" id="reg-birth" name="birth_date" class="auth-field-input">
                        <span class="error-msg-field" id="error-reg-birth"></span>
                    </div>

                    <div class="auth-group-block">
                        <label for="reg-region" class="auth-field-label">REGIÓN</label>
                        <select id="reg-region" name="region" class="auth-field-select" required>
                            <option value="">-- Seleccione la región --</option>
                            </select>
                        <span class="error-msg-field" id="error-reg-region"></span>
                    </div>

                    <div class="auth-group-block">
                        <label for="reg-comuna" class="auth-field-label">COMUNA</label>
                        <select id="reg-comuna" name="comuna" class="auth-field-select" required>
                            <option value="">-- Seleccione la comuna --</option>
                            </select>
                        <span class="error-msg-field" id="error-reg-comuna"></span>
                    </div>

                    <!-- Dirección Obligatoria Full Row -->
                    <div class="auth-group-block grid-full-width">
                        <label for="reg-address" class="auth-field-label">DIRECCIÓN DE ENTREGA</label>
                        <input type="text" id="reg-address" name="address" class="auth-field-input" maxlength="300" required>
                        <span class="error-msg-field" id="error-reg-address"></span>
                    </div>

                    <div class="auth-action-row grid-full-width">
                        <button type="submit" class="btn-submit-auth" id="btn-register-submit">REGISTRAR</button>
                    </div>

                </form>
            </div>

        </div>
    </main>

    <!-- FOOTER COMPARTIDO -->
    <footer class="main-footer" id="site-footer">
        <div class="footer-container">
            <div class="footer-brand-area" id="footer-brand-block">
                <span class="footer-site-name">HuertoHogar</span>
                <div class="payment-methods" id="payment-gateways">
                    <img src="https://raw.githubusercontent.com/aaronfagan/svg-credit-card-payment-icons/master/flat/visa.svg" alt="Visa" class="card-logo">
                    <img src="https://raw.githubusercontent.com/aaronfagan/svg-credit-card-payment-icons/master/flat/mastercard.svg" alt="Mastercard" class="card-logo">
                    <img src="https://raw.githubusercontent.com/aaronfagan/svg-credit-card-payment-icons/master/flat/amex.svg" alt="American Express" class="card-logo">
                </div>
            </div>
            <nav class="footer-nav-categories" id="footer-links-block">
                <ul>
                    <li><a href="nosotros.html" class="footer-link">Nuestra Historia</a></li>
                    <li><a href="blog.html" class="footer-link">Blog y Consejos</a></li>
                    <li><a href="contacto.html" class="footer-link">Soporte y Contacto</a></li>
                </ul>
            </nav>
            <div class="footer-newsletter-area" id="footer-subscribe-block">
                <p class="newsletter-title">¡Mantente en contacto! Súmate a nuestro boletín.</p>
                <form class="newsletter-form" id="form-newsletter" action="#" method="POST">
                    <input type="email" name="user_email" class="input-newsletter" id="input-newsletter-email" placeholder="Correo electrónico" required>
                    <button type="submit" class="btn-newsletter" id="btn-newsletter-submit">Suscribirse</button>
                </form>
            </div>
        </div>
    </footer>

    <script src="../../js/validaciones.js" id="script-validations"></script>
    <script src="../../js/main.js" id="script-main"></script>
</body>
</html>
